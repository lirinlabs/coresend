name: Build and Publish to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write 
      actions: read 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: normalize_image_name
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER="$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$REPO_LOWER" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # 1. BUILD & PUSH APP IMAGE
      # ==========================================
      - name: Extract metadata for App
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          # Appends "-app" to the image name
          images: ${{ env.REGISTRY }}/${{ steps.normalize_image_name.outputs.image_name }}-app
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ==========================================
      # 2. BUILD & PUSH BACKEND IMAGE
      # ==========================================
      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.normalize_image_name.outputs.image_name }}-backend
          tags: |
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
